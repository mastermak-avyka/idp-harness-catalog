pipeline:
  name: Catalog Provision Pipeline
  identifier: Catalog_Provision_Pipeline
  projectIdentifier: mak_playground
  orgIdentifier: playground
  tags: {}
  stages:
    - stage:
        name: IDP Catalog Automation Stage
        identifier: IDP_Catalog_Automation_Stage
        description: Automated end-to-end software component catalog entry provisioning stage via native IDP plugins.
        type: IDP
        spec:
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  type: GitClone
                  name: Git Clone Repository
                  identifier: git_clone
                  spec:
                    repoName: <+pipeline.variables.REPO_NAME>
                    build:
                      type: branch
                      spec:
                        branch: <+pipeline.variables.REPO_BRANCH>
              - step:
                  type: CreateCatalog
                  name: Create Catalog Entry
                  identifier: Create_Catalog_Entry
                  spec:
                    fileName: catalog-info.yaml
                    filePath: <+pipeline.variables.REPO_NAME>
                    fileContent: |-
                      apiVersion: harness.io/v1
                      kind: Component
                      type: service
                      identifier: <+pipeline.variables.APP_NAME>
                      name: <+pipeline.variables.APP_NAME>
                      owner: user:attaullah.n.khan@avyka.com
                      orgIdentifier: playground
                      projectIdentifier: mak_playground
                      spec:
                        lifecycle: dev
                      metadata:
                        description: "<+pipeline.variables.APP_DESCRIPTION>"
                        tags:
                          - idp-provisioned
                        annotations:
                          backstage.io/v1alpha1/launch-template: template:default/provision-new-catalog
              - step:
                  type: DirectPush
                  name: Direct Push File
                  identifier: Direct_Push_File
                  spec:
                    forcePush: true
                    organization: playground
                    project: mak_playground
                    repository: <+pipeline.variables.REPO_NAME>
                    codeDirectory: <+pipeline.variables.REPO_NAME>
                    branch: <+pipeline.variables.REPO_BRANCH>
                    harnessCodeRepoType: project
              - step:
                  type: RegisterCatalog
                  name: Register Catalog In IDP
                  identifier: Register_Catalog_In_IDP
                  spec:
                    organization: playground
                    project: mak_playground
                    repository: <+pipeline.variables.REPO_NAME>
                    filePath: catalog-info.yaml
                    branch: <+pipeline.variables.REPO_BRANCH>
                    harnessCodeRepoType: project
              - step:
                  type: SlackNotify
                  name: Slack Registration Notify
                  identifier: Slack_Registration_Notify
                  spec:
                    channel: <+secrets.getValue("project.idp_slack_channel_id")>
                    messageContent: "✅ *Harness IDP Provisioning Update:* The application catalog entry for *<+pipeline.variables.APP_NAME>* has passed all automated staging validation loops and is now live inside the Software Component Directory. Track run history: <+pipeline.executionUrl>"
                    token: idp_slack_token
          cloneCodebase: false
  variables:
    - name: APP_NAME
      type: String
      required: false
      value: <+input>
    - name: APP_DESCRIPTION
      type: String
      required: false
      value: <+input>
    - name: REPO_NAME
      type: String
      required: false
      value: <+input>
    - name: REPO_BRANCH
      type: String
      required: false
      value: <+input>
